<h1>HQ Disposal Review</h1>

<p>{{ record.account_number }}</p>
<p>{{ record.customer_name }}</p>
<p>{{ record.removed_meter }}</p>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>HQ Receipt Remarks</label>

    <textarea
        name="disposal_remarks"
    ></textarea>

    <button type="submit">
        Acknowledge Receipt
    </button>

</form>
