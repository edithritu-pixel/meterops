<!DOCTYPE html>
<html>

<head>

    <title>MeterOps</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .layout{
            display:flex;
        }

        .sidebar{
            width:250px;
            background:#1e293b;
            min-height:100vh;
            padding:20px;
        }

        .sidebar h2{
            color:white;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 0;
        }

        .sidebar a:hover{
            color:#38bdf8;
        }

        .content{
            flex:1;
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:8px;
        }
        
       

        .cards .card{
            background:white;
            padding:8px 12px;
            border-radius:8px;
            min-height:55px;
            margin-bottom:0;
            box-sizing:border-box;
        }

        .cards .card p{
            margin:0;
            font-size:12px;
        }
        

        .cards .card h2{
            margin-top:2px;
            margin-bottom:0;
            font-size:16px;
}


        .tabs{
            display:flex;
            gap:10px;
            margin-bottom:20px;
            flex-wrap:wrap;
        }

        .tab{
            padding:10px 18px;
            background:#e5e7eb;
            border-radius:8px;
            text-decoration:none;
            color:#111827;
            font-weight:bold;
        }

        .tab:hover{
            background:#d1d5db;
        }

        .active-tab{
            background:#2563eb;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th,
        table td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }
        .summary-header{
            background:#1e293b;
            color:white;
            padding:12px 15px;
            margin:-14px -14px 15px -14px;
            border-radius:10px 10px 0 0;
            font-size:18px;
            font-weight:bold;
        }
        .regional-table tr:nth-child(even){
            background:#f3f4f6;
        }

        .regional-table tr:nth-child(odd){
            background:white;
        }



        /* =========================================
   REPORTS
========================================= */

.report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.report-card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    border: 1px solid #E5E7EB;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transition: all 0.2s ease;
}

.report-card:hover {
    transform: translateY(-3px);
}

.report-card h3 {
    margin-top: 0;
    margin-bottom: 10px;
    color: #1F2937;
}

.report-card p {
    color: #6B7280;
    margin-bottom: 15px;
}

.btn-primary {
    display: inline-block;
    padding: 10px 18px;
    background: #2563EB;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
}

.btn-primary:hover {
    background: #1D4ED8;
}
    </style>

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>MeterOps</h2>

        <a href="/">Dashboard</a>

        <a href="/roq">
    Regional Operations Queue
</a>
         <a href="/work_plan">
    Work Plan
</a>
       <hr>

<a href="/inventory">
    Meter Inventory
</a>

<a href="/upload_meters">
    Upload Meters
</a>

<a href="/stock_summary">
    Stock Summary
</a>

<hr>



<a href="/batching_queue">
    Batching Queue
</a>
<a href="/test_bench">
    Test Bench
</a>

<a href="/passed_testing">
    Passed Testing
</a>
<a href="/failed_testing">
    Failed Testing
</a>
<a href="/upload_customers">
    Upload Customers
</a>
<li>
    <a href="/pending_disposal">
        Pending Disposal
    </a>
</li>
<a href="/reports">
    Reports
</a>
<a href="/activity_logs">Activity Logs</a>

<a href="/settings">
    Administration
</a>

        <a href="/logout">
            Logout
        </a>

    </div>

    <div class="content">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
